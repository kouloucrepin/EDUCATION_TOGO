  <!-- Points chauds au nord (Savanes) -->
  <g>
    <circle cx="1160" cy="112" r="26" fill="none" stroke="#EF3340" stroke-width="4" opacity="0.55"/>
    <circle cx="1160" cy="112" r="15" fill="#EF3340"/>
    <circle cx="1100" cy="192" r="22" fill="none" stroke="#EF3340" stroke-width="4" opacity="0.45"/>
    <circle cx="1100" cy="192" r="13" fill="#EF3340"/>
  </g>
  <!-- Projets COSO (or) -->
  <g fill="#FFCE00">
    <circle cx="1240" cy="194" r="13"/><circle cx="1186" cy="256" r="13"/><circle cx="1196" cy="328" r="13"/>
    <circle cx="1196" cy="762" r="13"/>
