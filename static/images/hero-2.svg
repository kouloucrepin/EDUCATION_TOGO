<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="fond2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00231b"/>
      <stop offset="0.55" stop-color="#004D3A"/>
      <stop offset="1" stop-color="#015a42"/>
    </linearGradient>
    <radialGradient id="halo2" cx="0.25" cy="0.75" r="0.6">
      <stop offset="0" stop-color="#0aa876" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#0aa876" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#fond2)"/>
  <rect width="1600" height="900" fill="url(#halo2)"/>

  <!-- Togo stylisé en points (forme allongée nord-sud) -->
