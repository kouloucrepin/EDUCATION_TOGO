    <circle cx="1100" cy="192" r="11"/><circle cx="1170" cy="184" r="11"/><circle cx="1240" cy="194" r="11"/>
    <circle cx="1116" cy="264" r="11"/><circle cx="1186" cy="256" r="11"/><circle cx="1250" cy="268" r="11"/>
    <circle cx="1128" cy="336" r="11"/><circle cx="1196" cy="328" r="11"/><circle cx="1258" cy="340" r="11"/>
    <circle cx="1138" cy="408" r="11"/><circle cx="1206" cy="400" r="11"/><circle cx="1266" cy="412" r="11"/>
    <circle cx="1146" cy="480" r="11"/><circle cx="1214" cy="472" r="11"/><circle cx="1272" cy="484" r="11"/>
    <circle cx="1152" cy="552" r="11"/><circle cx="1220" cy="544" r="11"/><circle cx="1278" cy="556" r="11"/>
    <circle cx="1158" cy="624" r="11"/><circle cx="1226" cy="616" r="11"/><circle cx="1284" cy="628" r="11"/>
    <circle cx="1170" cy="696" r="11"/><circle cx="1236" cy="690" r="11"/><circle cx="1290" cy="700" r="11"/>
    <circle cx="1196" cy="762" r="11"/><circle cx="1256" cy="758" r="11"/>
