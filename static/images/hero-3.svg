<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="fond3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#001d17"/>
      <stop offset="0.5" stop-color="#012f24"/>
      <stop offset="1" stop-color="#004D3A"/>
    </linearGradient>
    <radialGradient id="halo3" cx="0.82" cy="0.78" r="0.55">
      <stop offset="0" stop-color="#B8860B" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#B8860B" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#fond3)"/>
  <rect width="1600" height="900" fill="url(#halo3)"/>

  <!-- Grille -->
  <g stroke="#ffffff" stroke-width="1.5" opacity="0.07">
    <line x1="820" y1="160" x2="1520" y2="160"/>
    <line x1="820" y1="300" x2="1520" y2="300"/>
    <line x1="820" y1="440" x2="1520" y2="440"/>
    <line x1="820" y1="580" x2="1520" y2="580"/>
    <line x1="820" y1="720" x2="1520" y2="720"/>
  </g>

  <!-- Historique (vert clair) -->
  <polyline points="840,660 940,640 1040,590 1140,560" fill="none"
            stroke="#7FD8B8" stroke-width="9" stroke-linecap="round"/>
  <circle cx="1140" cy="560" r="13" fill="#7FD8B8"/>

  <!-- Projection optimiste (or, pointillés) -->
  <polyline points="1140,560 1250,480 1370,370 1480,270" fill="none"
            stroke="#FFCE00" stroke-width="9" stroke-linecap="round" stroke-dasharray="4 26"/>
  <circle cx="1480" cy="270" r="16" fill="#FFCE00"/>

  <!-- Projection pessimiste (rouge, pointillés) -->
  <polyline points="1140,560 1260,552 1380,548 1480,544" fill="none"
            stroke="#EF3340" stroke-width="7" stroke-linecap="round" stroke-dasharray="4 26" opacity="0.85"/>

  <!-- Étiquettes -->
  <g font-family="Segoe UI, sans-serif" font-weight="700">
    <text x="1354" y="238" font-size="30" fill="#FFCE00">77 % · 2030</text>
    <text x="1330" y="600" font-size="24" fill="#FF8D96">64 % si statu quo</text>
    <text x="830" y="708" font-size="22" fill="#9fd8c2" opacity="0.8">2013</text>
    <text x="1108" y="708" font-size="22" fill="#9fd8c2" opacity="0.8">2022</text>
    <text x="1440" y="708" font-size="22" fill="#9fd8c2" opacity="0.8">2030</text>
  </g>

  <!-- Pièce et flèche symboliques (investissement) -->
  <g opacity="0.10" fill="#FFCE00">
    <circle cx="300" cy="620" r="150"/>
    <rect x="240" y="560" width="120" height="120" rx="16" fill="#001d17"/>
  </g>
</svg>
