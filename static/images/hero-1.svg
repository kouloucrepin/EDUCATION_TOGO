<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="fond1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#001d17"/>
      <stop offset="0.5" stop-color="#00402f"/>
      <stop offset="1" stop-color="#00553F"/>
    </linearGradient>
    <radialGradient id="halo1" cx="0.78" cy="0.25" r="0.6">
      <stop offset="0" stop-color="#00A86B" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#00A86B" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#fond1)"/>
  <rect width="1600" height="900" fill="url(#halo1)"/>

  <!-- Silhouette d'école (filigrane) : murs, toit, drapeau — remontée en haut à droite -->
  <g opacity="0.10" fill="#ffffff">
    <rect x="1000" y="250" width="470" height="200"/>
    <polygon points="972,250 1235,152 1498,250"/>
    <rect x="1046" y="308" width="70" height="84" fill="#001d17"/>
    <rect x="1160" y="308" width="70" height="84" fill="#001d17"/>
    <rect x="1274" y="308" width="70" height="142" fill="#001d17"/>
    <rect x="1231" y="88" width="8" height="70"/>
    <rect x="1239" y="90" width="48" height="28" fill="#FFCE00" opacity="0.9"/>
  </g>

  <!-- Entonnoir éducatif (100 -> 63 -> 27) : déplacé à droite, hors de la colonne de texte -->
  <g font-family="Segoe UI, sans-serif" font-weight="700">
    <rect x="968" y="556" width="560" height="52" rx="10" fill="#E8F5E9" opacity="0.92"/>
    <text x="994" y="590" font-size="26" fill="#003D2E">100 élèves au primaire</text>
    <rect x="968" y="628" width="353" height="52" rx="10" fill="#FFCE00" opacity="0.92"/>
    <text x="994" y="662" font-size="26" fill="#4A3800">63 au collège</text>
    <rect x="968" y="700" width="151" height="52" rx="10" fill="#EF3340" opacity="0.92"/>
    <text x="994" y="734" font-size="24" fill="#FFF">27 au lycée</text>
  </g>

  <!-- Trame de points décorative -->
  <g fill="#ffffff" opacity="0.05">
    <circle cx="120" cy="130" r="5"/><circle cx="180" cy="130" r="5"/><circle cx="240" cy="130" r="5"/><circle cx="300" cy="130" r="5"/>
    <circle cx="120" cy="190" r="5"/><circle cx="180" cy="190" r="5"/><circle cx="240" cy="190" r="5"/>
    <circle cx="120" cy="250" r="5"/><circle cx="180" cy="250" r="5"/>
  </g>
</svg>
