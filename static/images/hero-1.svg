<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="fond1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#001d17"/>
      <stop offset="0.5" stop-color="#00402f"/>
      <stop offset="1" stop-color="#00553F"/>
    </linearGradient>
    <radialGradient id="halo1" cx="0.78" cy="0.25" r="0.6">
      <stop offset="0" stop-color="#00A86B" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#00A86B" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#fond1)"/>
  <rect width="1600" height="900" fill="url(#halo1)"/>

  <!-- Silhouette d'école : murs, toit, drapeau -->
  <g opacity="0.10" fill="#ffffff">
    <rect x="980" y="470" width="520" height="250"/>
    <polygon points="950,470 1240,360 1530,470"/>
    <rect x="1030" y="540" width="80" height="100" fill="#001d17"/>
    <rect x="1160" y="540" width="80" height="100" fill="#001d17"/>
    <rect x="1290" y="540" width="80" height="180" fill="#001d17"/>
    <rect x="1236" y="290" width="8" height="80"/>
    <rect x="1244" y="292" width="52" height="30" fill="#FFCE00" opacity="0.9"/>
  </g>

  <!-- Entonnoir éducatif : 100 -> 63 -> 27 -->
  <g font-family="Segoe UI, sans-serif" font-weight="700">
    <rect x="120" y="560" width="560" height="52" rx="10" fill="#E8F5E9" opacity="0.92"/>
    <text x="146" y="594" font-size="26" fill="#003D2E">100 élèves au primaire</text>
    <rect x="120" y="632" width="353" height="52" rx="10" fill="#FFCE00" opacity="0.92"/>
    <text x="146" y="666" font-size="26" fill="#4A3800">63 au collège</text>
    <rect x="120" y="704" width="151" height="52" rx="10" fill="#EF3340" opacity="0.92"/>
    <text x="146" y="738" font-size="24" fill="#FFF">27 au lycée</text>
  </g>

  <!-- Trame de points décorative -->
  <g fill="#ffffff" opacity="0.05">
    <circle cx="120" cy="130" r="5"/><circle cx="180" cy="130" r="5"/><circle cx="240" cy="130" r="5"/><circle cx="300" cy="130" r="5"/>
    <circle cx="120" cy="190" r="5"/><circle cx="180" cy="190" r="5"/><circle cx="240" cy="190" r="5"/>
    <circle cx="120" cy="250" r="5"/><circle cx="180" cy="250" r="5"/>
  </g>
</svg>
